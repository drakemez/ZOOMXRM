<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roadmaster × Zoom — Driving Excellence at the Speed of Communication</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Archivo+Narrow:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --rm-red:#C8102E;
    --rm-red-deep:#8A0B20;
    --rm-bone:#F4EEE3;
    --rm-bone-2:#E8DFCC;
    --ink:#1A1C20;
    --ink-2:#232529;
    --ink-3:#2B2E34;
    --line:rgba(244,238,227,0.12);
    --line-2:rgba(244,238,227,0.22);
    --mute:rgba(244,238,227,0.62);
    --mute-2:rgba(244,238,227,0.42);
    --zoom:#0B5CFF;
    --zoom-soft:#4A86FF;
    --ok:#8DD35F;
    --warn:#E8A33D;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--rm-bone);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .display{font-family:'Archivo Narrow',Impact,sans-serif;text-transform:uppercase;letter-spacing:.02em}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  .wrap{max-width:1320px;margin:0 auto;padding:0 40px}
  @media (max-width:800px){.wrap{padding:0 20px}}
  .chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--line-2);border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:var(--rm-red);box-shadow:0 0 0 4px rgba(200,16,46,.2)}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;border-radius:4px;font-weight:600;font-size:14px;letter-spacing:.02em;cursor:pointer;border:1px solid transparent;transition:all .15s}
  .btn-red{background:var(--rm-red);color:#fff;border-color:var(--rm-red)}
  .btn-red:hover{background:var(--rm-red-deep);border-color:var(--rm-red-deep)}
  .btn-ghost{background:transparent;color:var(--rm-bone);border-color:var(--line-2)}
  .btn-ghost:hover{border-color:var(--rm-bone);background:rgba(244,238,227,.04)}
  ::selection{background:var(--rm-red);color:#fff}
  /* nav */
  .nav{position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:blur(12px);background:rgba(255,255,255,.94);border-bottom:1px solid rgba(0,0,0,.08);box-shadow:0 1px 0 rgba(0,0,0,.04)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;gap:80px;padding:14px 40px}
  .nav-links{display:flex;gap:32px;font-size:13px;color:#000;font-weight:600}
  .nav-links a{cursor:pointer;transition:color .15s}
  .nav-links a:hover{color:var(--rm-red)}
  .brand{display:flex;align-items:center;gap:14px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#0B0C0E}
  .brand .x{color:rgba(11,12,14,.32)}
  /* Animated logo is white-on-transparent; invert so it reads dark on the white nav */
  .rm-logo img{filter:invert(1) brightness(.12)}
  .progress{position:fixed;top:0;left:0;height:2px;background:var(--rm-red);z-index:60;transition:width .1s linear}
  @media (max-width:900px){.nav-links{display:none}}
  /* sections */
  section{position:relative;padding:120px 0;border-bottom:1px solid var(--line)}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--rm-red);font-weight:600}
  h1.hero-h{font-family:'Archivo Narrow',Impact,sans-serif;font-size:clamp(52px,7.5vw,132px);line-height:.9;letter-spacing:-.01em;text-transform:uppercase;margin:24px 0;font-weight:600}
  h2.sec-h{font-family:'Archivo Narrow',Impact,sans-serif;font-size:clamp(36px,4.8vw,72px);line-height:1;letter-spacing:-.005em;text-transform:uppercase;margin:12px 0 24px;font-weight:600}
  .lede{font-size:20px;line-height:1.5;color:var(--mute);max-width:620px}
  /* hero */
  .hero{min-height:100vh;display:flex;align-items:center;padding-top:100px;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.3fr .85fr;gap:60px;align-items:end;width:100%}
  @media (max-width:1000px){.hero-grid{grid-template-columns:1fr;gap:40px}}
  .hero-left .tag-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
  .hero-red{color:var(--rm-red)}
  .hero-right{border-left:1px solid var(--line);padding-left:40px}
  @media (max-width:1000px){.hero-right{border-left:0;padding-left:0;border-top:1px solid var(--line);padding-top:40px}}
  .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
  .stat-row .stat{padding:20px 0;border-top:1px solid var(--line)}
  .stat .v{font-family:'Archivo Narrow',sans-serif;font-size:56px;line-height:1;font-weight:700}
  .stat .l{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);margin-top:8px}
  .ticker{border:1px solid var(--line);border-radius:4px;padding:20px;background:linear-gradient(180deg,var(--ink-2) 0%,var(--ink) 100%);margin-top:24px}
  .ticker-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .ticker-row:last-child{border-bottom:0}
  .ticker-row .k{color:var(--mute);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .ticker-row .v{font-family:'JetBrains Mono',monospace;font-weight:500}
  .hero-cta{display:flex;gap:12px;margin-top:36px;flex-wrap:wrap}
  .backdrop{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:-1}
  .backdrop .road{position:absolute;right:-10%;bottom:-20%;width:80%;height:140%;background:
    radial-gradient(ellipse at 70% 40%,rgba(200,16,46,.18) 0%,transparent 55%);
    filter:blur(20px)}
  .grid-bg{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);pointer-events:none;z-index:-1;opacity:.5}
  /* problem strip */
  .prob-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:48px}
  @media (max-width:900px){.prob-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:560px){.prob-grid{grid-template-columns:1fr}}
  .prob-cell{background:var(--ink);padding:36px 28px;position:relative}
  .prob-cell .num{font-family:'Archivo Narrow',sans-serif;font-size:20px;color:var(--rm-red);font-weight:700}
  .prob-cell h3{font-family:'Archivo Narrow',sans-serif;font-size:24px;text-transform:uppercase;font-weight:600;margin:16px 0 10px;letter-spacing:.01em}
  .prob-cell p{font-size:14px;color:var(--mute);line-height:1.55;margin:0}
  .prob-cell .bar{position:absolute;top:0;left:0;height:3px;background:var(--rm-red);width:0;transition:width .8s ease .2s}
  .prob-cell.in-view .bar{width:100%}
  /* plan toggle */
  .seg{display:inline-flex;padding:4px;border:1px solid var(--line-2);border-radius:4px;background:var(--ink-2)}
  .seg button{background:transparent;border:0;color:var(--mute);padding:10px 18px;font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:2px;font-family:inherit}
  .seg button.on{background:var(--rm-red);color:#fff}
  .plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--line);border:1px solid var(--line);margin-top:40px}
  @media (max-width:900px){.plan-grid{grid-template-columns:1fr}}
  .plan{background:var(--ink);padding:40px;position:relative}
  .plan.featured{background:linear-gradient(180deg,rgba(200,16,46,.08),var(--ink) 40%);box-shadow:inset 3px 0 0 var(--rm-red)}
  .plan .price{display:flex;align-items:baseline;gap:8px;margin:16px 0 4px}
  .plan .price .big{font-family:'Archivo Narrow',sans-serif;font-size:56px;font-weight:700;line-height:1}
  .plan .price .per{color:var(--mute);font-size:14px}
  .plan .price .sub{color:var(--mute);font-size:13px;margin-top:4px}
  .feat{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .feat:last-child{border-bottom:0}
  .feat .ico{width:18px;height:18px;flex-shrink:0;margin-top:2px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
  .feat.yes .ico{background:rgba(141,211,95,.16);color:var(--ok)}
  .feat.no .ico{background:rgba(244,238,227,.06);color:var(--mute-2)}
  .feat.new .ico{background:rgba(200,16,46,.22);color:var(--rm-red)}
  .feat .txt{flex:1;color:var(--rm-bone)}
  .feat.no .txt{color:var(--mute-2);text-decoration:line-through;text-decoration-color:var(--line-2)}
  .feat .desc{color:var(--mute);font-size:12px;margin-top:2px}
  /* why zoom pillars */
  .pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
  @media (max-width:900px){.pillars{grid-template-columns:1fr}}
  .pillar{padding:32px;border:1px solid var(--line);background:var(--ink-2);border-radius:4px;position:relative;overflow:hidden}
  .pillar:hover{border-color:var(--line-2)}
  .pillar .big-num{font-family:'Archivo Narrow',sans-serif;font-size:120px;line-height:1;color:var(--rm-red);opacity:.12;position:absolute;right:-10px;top:-20px;font-weight:700}
  .pillar h3{font-family:'Archivo Narrow',sans-serif;font-size:28px;text-transform:uppercase;margin:0 0 12px;letter-spacing:.01em;font-weight:600}
  .pillar p{color:var(--mute);font-size:14px;line-height:1.6;margin:0}
  .pillar .stat{margin-top:20px;padding-top:20px;border-top:1px dashed var(--line);font-size:13px;color:var(--mute)}
  .pillar .stat strong{color:var(--rm-bone);font-family:'JetBrains Mono',monospace}
  /* ROI */
  .roi-wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:40px;margin-top:48px;align-items:start}
  @media (max-width:1000px){.roi-wrap{grid-template-columns:1fr}}
  .roi-controls{background:var(--ink-2);border:1px solid var(--line);padding:32px;border-radius:4px}
  .roi-row{padding:18px 0;border-bottom:1px dashed var(--line)}
  .roi-row:last-child{border-bottom:0}
  .roi-row .label{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:10px}
  .roi-row .label .name{color:var(--rm-bone);font-weight:500}
  .roi-row .label .val{font-family:'JetBrains Mono',monospace;color:var(--rm-red);font-weight:600}
  .roi-row .desc{font-size:12px;color:var(--mute);margin-top:6px}
  input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--line-2);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--rm-red);border:2px solid var(--ink);cursor:pointer;box-shadow:0 0 0 1px var(--rm-red)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--rm-red);border:2px solid var(--ink);cursor:pointer}
  .roi-results{background:linear-gradient(160deg,#18060A 0%,var(--ink) 70%);border:1px solid var(--rm-red-deep);padding:40px;border-radius:4px;position:relative;overflow:hidden}
  .roi-results::before{content:'';position:absolute;top:0;right:0;width:240px;height:240px;background:radial-gradient(circle,rgba(200,16,46,.25),transparent 70%);border-radius:50%;pointer-events:none}
  .roi-total{font-family:'Archivo Narrow',sans-serif;font-size:clamp(64px,9vw,112px);line-height:.95;font-weight:700;color:var(--rm-red);letter-spacing:-.01em}
  .roi-total .cur{font-size:.5em;vertical-align:top;margin-right:6px;color:var(--rm-bone);opacity:.6}
  .roi-label{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-top:12px}
  .roi-breakdown{margin-top:28px}
  .roi-bd-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px dashed var(--line);font-size:13px}
  .roi-bd-row:last-child{border-bottom:1px dashed var(--line)}
  .roi-bd-row .k{color:var(--mute)}
  .roi-bd-row .v{font-family:'JetBrains Mono',monospace;color:var(--rm-bone)}
  .roi-payback{margin-top:24px;padding:16px;background:rgba(0,0,0,.35);border-radius:4px;display:flex;justify-content:space-between;align-items:center}
  .roi-payback .k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}
  .roi-payback .v{font-family:'Archivo Narrow',sans-serif;font-size:32px;font-weight:700;color:var(--ok)}
  .preset-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .preset{padding:6px 12px;border:1px solid var(--line-2);border-radius:2px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);cursor:pointer;background:transparent;font-family:inherit}
  .preset:hover{color:var(--rm-bone)}
  .preset.on{background:var(--rm-bone);color:var(--ink);border-color:var(--rm-bone)}
  /* TCO - side by side interactive */
  .tco-tiers{margin-top:40px;display:flex;gap:10px;flex-wrap:wrap}
  .tco-tier{position:relative;background:var(--ink-2);border:1px solid var(--line);color:var(--mute);padding:16px 20px;cursor:pointer;border-radius:3px;font-family:inherit;text-align:left;min-width:200px;flex:1;transition:all .15s}
  .tco-tier:hover{border-color:var(--line-2);color:var(--rm-bone)}
  .tco-tier.on{background:var(--ink);border-color:var(--rm-red);color:var(--rm-bone);box-shadow:inset 3px 0 0 var(--rm-red)}
  .tco-tier .tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute-2);font-weight:600}
  .tco-tier.on .tag{color:var(--rm-red)}
  .tco-tier .lbl{font-family:'Archivo Narrow',sans-serif;font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;margin-top:6px;line-height:1.15}
  .tco-tier .rec{position:absolute;top:-9px;right:12px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#fff;background:var(--rm-red);padding:3px 8px;border-radius:2px;font-weight:700}
  .tco-side{margin-top:32px;display:grid;grid-template-columns:1fr auto 1fr;gap:0;background:var(--line);border:1px solid var(--line);border-radius:4px;overflow:hidden;align-items:stretch}
  @media (max-width:900px){.tco-side{grid-template-columns:1fr}}
  .tco-side-col{background:var(--ink);padding:40px}
  .tco-side-col.zoom{background:linear-gradient(180deg,rgba(200,16,46,.08),var(--ink) 50%)}
  .tco-side-col .vendor{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:600}
  .tco-side-col.zoom .vendor{color:var(--rm-red)}
  .tco-side-col .pkg{font-family:'Archivo Narrow',sans-serif;font-size:22px;font-weight:600;text-transform:uppercase;margin-top:6px;line-height:1.15;min-height:54px}
  .tco-side-col .mo{font-family:'Archivo Narrow',sans-serif;font-size:64px;font-weight:700;line-height:1;margin-top:20px}
  .tco-side-col.zoom .mo{color:var(--rm-red)}
  .tco-side-col .per{color:var(--mute);font-size:13px;margin-top:4px}
  .tco-side-col .term{margin-top:20px;padding-top:20px;border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:13px}
  .tco-side-col .term .v{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--rm-bone);display:block;margin-top:4px;font-size:15px}
  .tco-side-col .term .k{color:var(--mute);font-size:10px;letter-spacing:.16em;text-transform:uppercase}
  .tco-side-col .na{color:var(--mute-2);font-style:italic;font-size:15px;margin-top:20px;padding:14px;border:1px dashed var(--line-2);border-radius:2px;text-align:center}
  .tco-vs{background:var(--ink);display:flex;align-items:center;justify-content:center;padding:0 18px;position:relative;min-width:140px}
  @media (max-width:900px){.tco-vs{padding:8px;min-width:0}}
  .tco-vs .vs-circle{width:96px;height:96px;border-radius:50%;border:1px solid var(--rm-red);display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink-2)}
  .tco-vs .vs-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:600}
  .tco-vs .vs-delta{font-family:'Archivo Narrow',sans-serif;font-size:24px;font-weight:700;color:var(--ok);margin-top:2px}
  .tco-vs .vs-delta.na{color:var(--mute-2);font-size:18px}
  .tco-vs .vs-sub{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-top:4px;text-align:center;max-width:80px;line-height:1.3}
  .tco-term{margin-top:32px;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--line);border:1px solid var(--line);border-radius:4px;overflow:hidden}
  @media (max-width:700px){.tco-term{grid-template-columns:repeat(2,1fr)}}
  .tco-term-cell{background:var(--ink);padding:24px}
  .tco-term-cell .k{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);font-weight:600}
  .tco-term-cell .v{font-family:'Archivo Narrow',sans-serif;font-size:32px;font-weight:700;color:var(--rm-bone);margin-top:10px;line-height:1}
  .tco-term-cell.accent .v{color:var(--rm-red)}
  .tco-term-cell .note{font-size:12px;color:var(--mute);margin-top:8px}
  /* legacy TCO */
  .tco{margin-top:48px;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--line);border:1px solid var(--line)}
  @media (max-width:900px){.tco{grid-template-columns:1fr}}
  .tco-col{background:var(--ink);padding:32px}
  .tco-col.hi{background:linear-gradient(180deg,rgba(200,16,46,.1),var(--ink) 50%)}
  .tco-col .name{font-family:'Archivo Narrow',sans-serif;font-size:22px;text-transform:uppercase;font-weight:600;letter-spacing:.02em}
  .tco-col .total{font-family:'Archivo Narrow',sans-serif;font-size:56px;font-weight:700;line-height:1;margin:16px 0 4px}
  .tco-col .sub{color:var(--mute);font-size:13px}
  .tco-col .delta{margin-top:24px;padding:12px;border-radius:2px;font-size:12px}
  .tco-col .delta.bad{background:rgba(200,16,46,.12);color:#F5A6B0}
  .tco-col .delta.good{background:rgba(141,211,95,.1);color:var(--ok)}
  .tco-col .delta.neutral{background:rgba(244,238,227,.05);color:var(--mute)}
  /* timeline */
  .timeline{margin-top:48px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--ink-2)}
  .tl-head{display:grid;grid-template-columns:repeat(6,1fr);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);border-bottom:1px solid var(--line)}
  .tl-head div{padding:16px 12px;border-right:1px solid var(--line);text-align:center}
  .tl-head div:last-child{border-right:0}
  .tl-row{position:relative;padding:24px;border-bottom:1px solid var(--line)}
  .tl-row:last-child{border-bottom:0}
  .tl-bar{height:40px;border-radius:2px;position:relative;cursor:pointer;transition:all .2s}
  .tl-bar:hover{transform:translateY(-1px)}
  .tl-bar .lbl{position:absolute;inset:0;display:flex;align-items:center;padding:0 16px;font-size:13px;font-weight:600;color:#fff;letter-spacing:.02em}
  .tl-bar .dates{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.75;font-weight:400}
  .tl-detail{margin-top:12px;font-size:13px;color:var(--mute);padding-left:16px;border-left:2px solid var(--line-2)}
  /* compliance */
  .compliance{margin-top:48px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media (max-width:900px){.compliance{grid-template-columns:repeat(2,1fr)}}

        try { sessionStorage.setItem('rm_zoom_auth','1'); } catch(e){}
        root.style.transition = 'opacity .25s';
        root.style.opacity = '0';

/* ---------- ROI calculator ---------- */
const ROI = () => {
  const presets = {
    conservative:{ahtPct:5,fcrPct:3,attritionPct:10,superPct:5},
    balanced:{ahtPct:12,fcrPct:8,attritionPct:25,superPct:15},
    aggressive:{ahtPct:20,fcrPct:15,attritionPct:40,superPct:25},
  };
  const [preset,setPreset] = useState(window.TWEAK_STATE?.roi_preset || 'balanced');
  const [ahtPct,setAht] = useState(presets.balanced.ahtPct);
  const [fcrPct,setFcr] = useState(presets.balanced.fcrPct);
  const [attr,setAttr] = useState(presets.balanced.attritionPct);
  const [sup,setSup] = useState(presets.balanced.superPct);

  const applyPreset = (p) => { setPreset(p); setAht(presets[p].ahtPct); setFcr(presets[p].fcrPct); setAttr(presets[p].attritionPct); setSup(presets[p].superPct); };

  // Assumptions (fully visible to the VP)
  const AGENTS = 70;
  const SUPERVISORS = 6;
  const AGENT_LOAD = 95000; // fully loaded annual
  const SUP_LOAD = 135000;
  const ATTRITION_BASE = 0.28; // industry
  const REPLACEMENT_COST = 18000;
  const CALLS_PER_DAY_PER_AGENT = 55;
  const BUSINESS_DAYS = 250;
  const AVG_CALL_MIN = 6.2;
  const AGENT_HR_COST = AGENT_LOAD/(250*8);

  const totals = useMemo(()=>{
    // 1) AHT reduction via Expert Assist (Elite)
    const totalMinutes = CALLS_PER_DAY_PER_AGENT*AGENTS*BUSINESS_DAYS*AVG_CALL_MIN;
    const minutesSaved = totalMinutes * (ahtPct/100);
    const ahtSavings = (minutesSaved/60) * AGENT_HR_COST;

    // 2) FCR lift: fewer repeat calls → capacity recovered
    const repeatCallReductionPct = fcrPct/100;
    const callsPerYear = CALLS_PER_DAY_PER_AGENT*AGENTS*BUSINESS_DAYS;
    const callsAvoided = callsPerYear*0.18*repeatCallReductionPct; // 18% base repeat rate
    const fcrSavings = callsAvoided*AVG_CALL_MIN/60*AGENT_HR_COST;

    // 3) Attrition reduction via QM + WFM + better tooling
    const attritionReduction = ATTRITION_BASE*(attr/100);
    const agentsRetained = AGENTS*attritionReduction;
    const attritionSavings = agentsRetained*REPLACEMENT_COST;

    // 4) Supervisor productivity via QM automation + unified admin
    const supProductivity = SUPERVISORS*SUP_LOAD*(sup/100);

    // 5) RingCentral baseline avoided + admin consolidation
    // Assume RC + separate CC platform costs ~$15k/mo
    const platformConsolidation = (15000-12869.50)*12;

    const total = ahtSavings+fcrSavings+attritionSavings+supProductivity+platformConsolidation;
    const eliteAnnual = 12869.50*12;
    const paybackMonths = eliteAnnual/(total/12);
    return {ahtSavings,fcrSavings,attritionSavings,supProductivity,platformConsolidation,total,paybackMonths};
  },[ahtPct,fcrPct,attr,sup]);

  const fmt = n => '$'+Math.round(n).toLocaleString();

  return (
    <section id="roi">
      <div className="wrap">
        <div className="reveal">
          <div className="eyebrow">VP of IT, here's the math</div>
          <h2 className="sec-h">ROI calculator —<br/>every assumption visible,<br/>every lever yours.</h2>
          <p className="lede">No black-box business case. Adjust the four levers Elite actually pulls, and watch the first-year impact recompute. Defaults are the middle of peer trucking contact-center benchmarks.</p>
        </div>

        <div className="roi-wrap">
          <div className="roi-controls reveal">
            <div className="eyebrow" style={{color:'var(--mute)'}}>Choose a posture</div>
            <div className="preset-row" style={{marginTop:12}}>
              {Object.keys(presets).map(p=>(
                <button key={p} className={'preset '+(preset===p?'on':'')} onClick={()=>applyPreset(p)}>{p}</button>
              ))}
            </div>

            <div className="roi-row">
              <div className="label"><span className="name">AHT reduction from AI Expert Assist</span><span className="val">−{ahtPct}%</span></div>
              <input type="range" min="0" max="25" value={ahtPct} onChange={e=>{setAht(+e.target.value);setPreset('custom')}}/>
              <div className="desc">Real-time agent coaching on live load-status and dispatch calls. Peer Elite benchmarks: 8–18%.</div>
            </div>

            <div className="roi-row">
              <div className="label"><span className="name">First-call resolution lift</span><span className="val">+{fcrPct}%</span></div>
              <input type="range" min="0" max="20" value={fcrPct} onChange={e=>{setFcr(+e.target.value);setPreset('custom')}}/>
              <div className="desc">Unified knowledge base and AI Companion surface answers inside the agent desktop.</div>
            </div>

            <div className="roi-row">
              <div className="label"><span className="name">Agent attrition reduction</span><span className="val">−{attr}%</span></div>
              <input type="range" min="0" max="50" value={attr} onChange={e=>{setAttr(+e.target.value);setPreset('custom')}}/>
              <div className="desc">Quality Management + Workforce Management reduce the two top churn drivers — unfair scheduling and opaque coaching. Industry attrition baseline: 28%.</div>
            </div>

            <div className="roi-row">
              <div className="label"><span className="name">Supervisor productivity gain</span><span className="val">+{sup}%</span></div>
              <input type="range" min="0" max="35" value={sup} onChange={e=>{setSup(+e.target.value);setPreset('custom')}}/>
              <div className="desc">QM automation eliminates 100%-manual call sampling. 6 supervisors × recovered hours.</div>
            </div>

            <div style={{marginTop:20,paddingTop:20,borderTop:'1px solid var(--line)'}}>
              <div className="eyebrow" style={{color:'var(--mute)'}}>Fixed assumptions</div>
              <ul className="kv-list">
                <li><span className="k">Agents · Supervisors</span><span className="v">70 · 8</span></li>
                <li><span className="k">Calls / agent / day</span><span className="v">55 @ 6.2 min AHT</span></li>
                <li><span className="k">Fully-loaded agent cost</span><span className="v">$95,000</span></li>
                <li><span className="k">Agent replacement cost</span><span className="v">$18,000</span></li>
                <li><span className="k">Baseline attrition</span><span className="v">28% / yr</span></li>
              </ul>
            </div>
          </div>

          <div className="roi-results reveal">
            <div className="eyebrow" style={{color:'var(--rm-bone)'}}>Year-1 Elite value delivered</div>
            <div className="roi-total"><span className="cur">$</span>{Math.round(totals.total).toLocaleString()}</div>
            <div className="roi-label">Annualized benefit vs. staying on RingCentral + Essentials</div>

            <div className="roi-breakdown">
              <div className="roi-bd-row"><span className="k">AHT reduction (Expert Assist)</span><span className="v">{fmt(totals.ahtSavings)}</span></div>
              <div className="roi-bd-row"><span className="k">FCR lift</span><span className="v">{fmt(totals.fcrSavings)}</span></div>
              <div className="roi-bd-row"><span className="k">Attrition reduction (QM + WFM)</span><span className="v">{fmt(totals.attritionSavings)}</span></div>
              <div className="roi-bd-row"><span className="k">Supervisor productivity</span><span className="v">{fmt(totals.supProductivity)}</span></div>
              <div className="roi-bd-row"><span className="k">Platform consolidation vs RC</span><span className="v">{fmt(totals.platformConsolidation)}</span></div>
            </div>

            <div className="roi-payback">
              <span className="k">Payback period on Elite</span>
              <span className="v">{isFinite(totals.paybackMonths)?totals.paybackMonths.toFixed(1):'—'} mo</span>
            </div>

            <div style={{fontSize:12,color:'var(--mute-2)',marginTop:20,lineHeight:1.6}}>
              Conservative methodology. Excludes soft benefits (driver satisfaction, dispatcher retention halo, security-incident avoidance). Based on Zoom Elite customer case studies in trucking & 3PL verticals.
            </div>
          </div>
        </div>
      </div>
    </section>
  );
};

        <option value="balanced">Balanced</option>
        <option value="aggressive">Aggressive</option>
      </select>
      <label className="tw-toggle">
        <input type="checkbox" checked={state.show_ringcentral} onChange={e=>setState({...state,show_ringcentral:e.target.checked})}/>
        Show RingCentral comparison column
      </label>
    </div>
  );
};

/* ---------- App ---------- */
const App = () => {
  useReveal();
  const [tweakState,setTweakState] = useState(window.TWEAK_DEFAULTS || {accent:'#C8102E',display_font:'Archivo Narrow',show_ringcentral:true,roi_preset:'balanced'});
  const [tweaksVisible,setTweaksVisible] = useState(false);

  // scroll progress
  useEffect(()=>{
    const h = ()=>{ const s = window.scrollY; const d = document.body.scrollHeight-window.innerHeight; document.getElementById('progress').style.width = Math.min(100,(s/d)*100)+'%'; };
    window.addEventListener('scroll',h,{passive:true}); return ()=>window.removeEventListener('scroll',h);
  },[]);

  // apply tweaks
  useEffect(()=>{
    document.documentElement.style.setProperty('--rm-red',tweakState.accent);
    document.querySelectorAll('h1.hero-h,h2.sec-h').forEach(el=>{ el.style.fontFamily = `'${tweakState.display_font}', Impact, sans-serif`; });
  },[tweakState]);

  // tweaks host protocol
  useEffect(()=>{
    const handler = (ev)=>{
      if(ev.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(ev.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  // persist tweaks
  useEffect(()=>{
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweakState},'*');
  },[tweakState]);

  return (
    <>
      <Nav/>
      <Hero/>
      <ProblemStrip/>
      <WhyZoom/>
      <EliteCompare showRC={tweakState.show_ringcentral}/>
      <ROI/>
      <TCO showRC={tweakState.show_ringcentral}/>
      <Timeline/>
      <Compliance/>
      <Decision/>
      <Footer/>
      <Tweaks state={tweakState} setState={setTweakState} visible={tweaksVisible}/>
    </>
  );
};

window.TWEAK_STATE = window.TWEAK_DEFAULTS;
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
